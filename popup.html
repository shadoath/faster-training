<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 240px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff;
    }

    .label {
      text-align: center;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #9ca3af;
      margin-bottom: 10px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .controls button {
      width: 32px;
      height: 32px;
      padding: 0;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      background: #f9fafb;
      transition: background 0.1s, border-color 0.1s;
      flex-shrink: 0;
    }

    .controls button:hover {
      background: #f0fdf4;
      border-color: #22c55e;
      color: #16a34a;
    }

    input[type="number"] {
      flex: 1;
      height: 32px;
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      color: #111827;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      background: #fff;
      -moz-appearance: textfield;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: #22c55e;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    /* Settings */

    .settings-toggle {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      padding: 6px 0 0;
      border-top: 1px solid #f3f4f6;
      cursor: pointer;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #9ca3af;
      user-select: none;
    }

    .settings-toggle:hover { color: #6b7280; }

    .settings-toggle .chevron {
      font-size: 9px;
      transition: transform 0.15s;
    }

    .settings-toggle.open .chevron { transform: rotate(180deg); }

    #settingsPanel {
      display: none;
      margin-top: 8px;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 7px;
    }

    .setting-label {
      font-size: 11px;
      color: #6b7280;
      white-space: nowrap;
    }

    .setting-row input[type="text"] {
      flex: 1;
      height: 26px;
      padding: 0 6px;
      font-size: 11px;
      font-weight: 600;
      color: #374151;
      border: 1px solid #e5e7eb;
      border-radius: 5px;
      background: #f9fafb;
      cursor: pointer;
      text-align: center;
    }

    .setting-row input[type="text"]:focus {
      outline: none;
      border-color: #22c55e;
      background: #f0fdf4;
      color: #15803d;
    }

    .setting-row input[type="text"].recording {
      border-color: #f59e0b;
      background: #fffbeb;
      color: #92400e;
    }

    .setting-row select {
      flex: 1;
      height: 26px;
      padding: 0 4px;
      font-size: 11px;
      color: #374151;
      border: 1px solid #e5e7eb;
      border-radius: 5px;
      background: #f9fafb;
      cursor: pointer;
    }

    .setting-row select:focus { outline: none; border-color: #22c55e; }

    .setting-row input[type="number"] {
      flex: 1;
      height: 26px;
      font-size: 11px;
      font-weight: 600;
    }

    .setting-row input[type="checkbox"] {
      width: 14px;
      height: 14px;
      cursor: pointer;
      accent-color: #22c55e;
    }

    .footer {
      margin-top: 10px;
      text-align: center;
      font-size: 9px;
      color: #d1d5db;
    }

    .footer a {
      color: #d1d5db;
      text-decoration: none;
    }

    .footer a:hover {
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="label">SPEED</div>
  <div class="controls">
    <button class="large" data-delta="-0.5">&lt;&lt;</button>
    <button data-delta="-0.1">&lt;</button>
    <input type="number" id="speed" min="0.1" max="16" step="0.1">
    <button data-delta="0.1">&gt;</button>
    <button class="large" data-delta="0.5">&gt;&gt;</button>
  </div>

  <div class="settings-toggle" id="settingsToggle">
    <span>SETTINGS</span>
    <span class="chevron" id="chevron">▼</span>
  </div>

  <div id="settingsPanel">
    <div class="setting-row">
      <span class="setting-label">Shortcut</span>
      <input type="text" id="shortcutInput" readonly placeholder="Click to record…">
    </div>
    <div class="setting-row">
      <span class="setting-label">Step</span>
      <select id="stepSelect">
        <option value="0.1">0.1x</option>
        <option value="0.25">0.25x</option>
        <option value="0.5">0.5x</option>
      </select>
    </div>
    <div class="setting-row">
      <span class="setting-label">Min speed</span>
      <input type="number" id="minSpeed" min="0.1" max="2" step="0.05">
    </div>
    <div class="setting-row">
      <span class="setting-label">Max speed</span>
      <input type="number" id="maxSpeed" min="1" max="16" step="0.5">
    </div>
    <div class="setting-row">
      <span class="setting-label">Show overlay</span>
      <input type="checkbox" id="showOverlay">
    </div>
  </div>

  <div class="footer"><a href="https://whiteboardworks.com" target="_blank" rel="noopener">whiteboardworks.com</a></div>
  <script src="popup.js"></script>
</body>
</html>
